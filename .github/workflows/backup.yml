name: Daily Supabase Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout backups branch
        uses: actions/checkout@v4
        with:
          ref: backups
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Export tables
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          DIR="$DATE"
          mkdir -p "$DIR"

          TABLES=(
            recipes recipe_ingredients recipe_versions recipe_comments
            menus menu_sections menu_items menu_scans
            profiles teams team_memberships team_invites
            prep_tasks prep_task_steps prep_templates prep_template_items
            inventory inventory_locations inventory_movements
            suppliers ingredient_suppliers
            wh_products wh_suppliers wh_supplier_catalogs wh_orders wh_order_items
            wh_categories wh_storage_locations
            purchase_orders purchase_order_items
            reservations shifts time_entries
            waste_entries waste_logs
            buffet_live_status
            haccp_appliances haccp_temperature_logs haccp_checks
            haccp_cleaning_tasks haccp_cleaning_logs
            journal_entries handover_notes
            online_orders online_order_items
            pos_transactions pos_settings
          )

          OK=0; FAIL=0
          for TABLE in "${TABLES[@]}"; do
            CODE=$(curl -s -o "$DIR/$TABLE.json" -w "%{http_code}" \
              -H "apikey: $KEY" \
              -H "Authorization: Bearer $KEY" \
              "$URL/rest/v1/$TABLE?select=*&limit=100000")
            if [ "$CODE" = "200" ]; then
              echo "✓ $TABLE"
              OK=$((OK+1))
            else
              echo "✗ $TABLE (HTTP $CODE)"
              rm -f "$DIR/$TABLE.json"
              FAIL=$((FAIL+1))
            fi
          done

          echo "{\"date\":\"$DATE\",\"ok\":$OK,\"skipped\":$FAIL}" > "$DIR/manifest.json"
          echo "→ $OK exported, $FAIL skipped"

      - name: Remove backups older than 30 days
        run: |
          find . -maxdepth 1 -type d -name "20*" | sort -r | tail -n +31 | xargs rm -rf || true

      - name: Create zip artifact
        run: |
          DATE=$(date +%Y-%m-%d)
          zip -r "chefsuite-backup-$DATE.zip" "$DATE/"
          echo "ZIP=chefsuite-backup-$DATE.zip" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chefsuite-backup-${{ env.ZIP }}
          path: ${{ env.ZIP }}
          retention-days: 90

      - name: Commit & push to backups branch
        run: |
          git config user.name  "ChefSuite Backup"
          git config user.email "backup@chefsuite.app"
          git add .
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "backup: $(date +%Y-%m-%d)"
            git push origin backups
          fi
